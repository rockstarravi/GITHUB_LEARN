name: helloworld-1
run-name: ${{ github.event.head_commit.message }}
on:
    workflow_dispatch:
        inputs:
            name:
                description: "provide input variable name"
                required: true
                default: "world!,welocme to github actions"
    push:
        branches:
            - main    
            - feature/*
        paths:
            - 'src/**'
            - 'tests/**'
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            
            - name: set up python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.14'

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install ruff
            
            - name: Run linter
              run: |
                    ruff check src tests
    
    test:
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: checkout code
              uses: actions/checkout@v7

            - name: set up python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.14'
            
            - name: Install dependencies
              run: |
                    python -m pip install --upgrade pip
                    pip install pytest
            
            - name: Run tests
              run: |
                    python -m pytest tests -q

    build:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: checkout code
              uses: actions/checkout@v7
            - name: set up python
              uses: actions/setup-python@v5
              with:
                python-version: '3.14'
            - name: Build project
              run: |
                    python -m compileall src